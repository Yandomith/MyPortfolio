<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact - Smith Yando</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script>
        (function () {
            emailjs.init("xeY-epzfNYlf7qjqV");
        })();
    </script>
</head>

<body>
    <div class="container">
        <div class="row">
            <nav id="navbar" class="navbar px-3 mb-1"></nav>
        </div>
    </div>

    <header class="main container fade-in-up section-padding align-items-center d-flex justify-content-center"
        style="min-height: 40vh;">
        <div class="row text-center">
            <div class="col-lg-8 mx-auto">
                <div class="categorytitle">Get In Touch</div>
                <h1 class="display-1 intro-title mb-4">Let's Create<br>Something Great</h1>
                <p class="fs-5 px-md-5 text-muted">Available for freelance opportunities and collaborations.</p>
            </div>
        </div>
    </header>

    <section class="container mb-5 section-padding">
        <div class="row g-5">
            <!-- Contact Form -->
            <div class="col-md-7">
                <div class="card glass-card p-4 border-0 h-100">
                    <h3 class="intro-title mb-4">Send a Message</h3>
                    <form id="contact-form">
                        <div class="mb-3">
                            <input type="text" class="form-control" id="name" name="name" placeholder="Name" required>
                        </div>
                        <div class="mb-3">
                            <input type="email" class="form-control" id="email" name="email" placeholder="Email"
                                required>
                        </div>
                        <div class="mb-3">
                            <textarea class="form-control" id="message" name="message" rows="6" placeholder="Message"
                                required></textarea>
                        </div>
                        <button type="submit" class="button1 w-100">Send Message</button>
                    </form>
                    <p id="status" class="mt-3 text-center"></p>
                </div>
            </div>

            <!-- Social & Info -->
            <div class="col-md-5">
                <div class="h-100 d-flex flex-column gap-4">
                    <!-- Socials -->
                    <div class="card glass-card p-4 border-0">
                        <h3 class="h4 intro-title mb-3">Connect</h3>
                        <div class="social-links d-flex gap-3 flex-wrap">
                            <a href="#" class="social-btn">LinkedIn</a>
                            <a href="#" class="social-btn">GitHub</a>
                            <a href="#" class="social-btn">Twitter</a>
                            <a href="#" class="social-btn">Instagram</a>
                        </div>
                    </div>

                    <!-- Email Direct -->
                    <div class="card glass-card p-4 border-0">
                        <h3 class="h4 intro-title mb-3">Email</h3>
                        <p class="text-muted mb-0">hello@smithyando.com</p>
                    </div>

                    <!-- Location -->
                    <div class="card glass-card p-4 border-0">
                        <h3 class="h4 intro-title mb-3">Location</h3>
                        <p class="text-muted mb-0">Remote / Worldwide</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit', function (event) {
            event.preventDefault();

            emailjs.sendForm('service_zvop4ti', 'template_habrqde', this, 'kGMKNDl2dRjXcdVaX')
                .then(function () {
                    document.getElementById('status').innerText = 'Message sent successfully!';
                    document.getElementById('contact-form').reset();
                }, function (error) {
                    document.getElementById('status').innerText = 'Failed to send message: ' + JSON.stringify(error);
                });
        });
    </script>
</body>

</html>
