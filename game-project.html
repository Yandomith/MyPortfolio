<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project - Smith Yando</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <nav id="navbar" class="navbar px-3 mb-1">
                <a class="navbar-brand" href="index.html">Smith Yando</a>
                <ul class="nav">
                    <li class="nav-item"><a class="nav-link" href="work.html">Work</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html#contactme">Contact</a></li>
                </ul>
            </nav>
        </div>
    </div>

    <main class="container main">
        <div id="project" class="row">
            <div class="col-12 text-center">
                <h1 id="project-title">Loading...</h1>
                <p id="project-summary"></p>
            </div>
            <div class="col-md-6">
                <img id="project-image" src="image/project_image.png" alt="" class="img-fluid">
            </div>
            <div class="col-md-6">
                <h4>Details</h4>
                <p id="project-details"></p>
                <h5>Platforms</h5>
                <ul id="project-platforms"></ul>
                <p class="small text-muted" id="project-credits"></p>
            </div>
        </div>
    </main>

    <script>
        // Helper: read query param
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        async function loadProject() {
            const id = getQueryParam('id');
            if (!id) {
                document.getElementById('project-title').innerText = 'No project specified.';
                return;
            }

            try {
                const resp = await fetch('data/games.json');
                const data = await resp.json();
                const project = data.find(p => p.id === id);
                if (!project) {
                    document.getElementById('project-title').innerText = 'Project not found.';
                    return;
                }

                document.getElementById('project-title').innerText = project.title + ' (' + project.year + ')';
                document.getElementById('project-summary').innerText = project.summary;
                document.getElementById('project-image').src = project.image.replace(/^\.\//, '');
                document.getElementById('project-details').innerText = project.details;
                document.getElementById('project-credits').innerText = project.credits;
                const platformsEl = document.getElementById('project-platforms');
                platformsEl.innerHTML = '';
                project.platforms.forEach(function (pl) {
                    const li = document.createElement('li');
                    li.innerText = pl;
                    platformsEl.appendChild(li);
                });
            } catch (err) {
                document.getElementById('project-title').innerText = 'Failed to load project data.';
                console.error(err);
            }
        }

        loadProject();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
