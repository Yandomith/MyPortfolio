    <script

      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9205434282277256"

  <body>
    <div class="container">
      <div class="row">
        <nav id="navbar" class="navbar px-3 mb-1"></nav>
      </div>
    </div>

    <main class="container page-content fade-in-up">
      <div class="row">
        <div class="col-12 mb-4 text-start">
          <a href="work.html#projects-list" class="btn button1"
            >← Back to Projects</a
          >
        </div>
      </div>
      <div id="project" class="card p-4">
        <div class="row">
          <div class="col-12 text-center">
            <h1 id="project-title" class="mb-3">Loading...</h1>
            <p id="project-summary" class="fs-5 text-muted mb-4"></p>
          </div>
          <div class="col-md-6 mb-4 mb-md-0">
            <img
              id="project-image"
              src="image/project_image.png"
              alt=""
              class="img-fluid rounded"
            />
          </div>
          <div class="col-md-6 text-start">
            <h4 class="mb-3">Details</h4>
            <p id="project-details" class="mb-4"></p>
            <h5>Platforms</h5>
            <ul id="project-platforms" class="mb-4"></ul>
            <p class="small text-muted" id="project-credits"></p>
            <div id="project-links" class="mt-3"></div>
          </div>
        </div>
      </div>
    </main>

    <script src="js/main.js"></script>
    <script>
      // Helper: read query param
      function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      async function loadProject() {
        const id = getQueryParam("id");
        if (!id) {
          document.getElementById("project-title").innerText =
            "No project specified.";
          return;
        }

        try {
          if (typeof PROJECTS_DATA === "undefined") {
            throw new Error("PROJECTS_DATA not loaded");
          }
          const project = PROJECTS_DATA.find((p) => p.id === id);
          if (!project) {
            document.getElementById("project-title").innerText =
              "Project not found.";
            return;
          }

          document.getElementById("project-title").innerText =
            project.title + " (" + project.year + ")";
          document.getElementById("project-summary").innerText =
            project.summary;
          document.getElementById("project-image").src = project.image;
          document.getElementById("project-details").innerText =
            project.details;
          document.getElementById("project-credits").innerText =
            project.credits;
          const platformsEl = document.getElementById("project-platforms");
          platformsEl.innerHTML = "";
          project.platforms.forEach(function (pl) {
            const li = document.createElement("li");
            li.innerText = pl;
            platformsEl.appendChild(li);
          });

          // Optional demo link
          const linksEl = document.getElementById("project-links");
          linksEl.innerHTML = "";
          if (project.demo_url) {
            const demoBtn = document.createElement("a");
            demoBtn.className = "btn button2";
            demoBtn.href = project.demo_url;
            demoBtn.target = "_blank";
            demoBtn.rel = "noopener noreferrer";
            demoBtn.innerText = "Live demo";
            linksEl.appendChild(demoBtn);
          }
        } catch (err) {
          document.getElementById("project-title").innerText =
            "Failed to load project data.";
          console.error(err);
        }
      }

      loadProject();
    </script>
    <footer class="container mt-5 mb-4 text-muted small">
      <div class="row">
        <div class="col">© Smith Yando</div>
      </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"

      crossorigin="anonymous"
    ></script>
  </body>
</html>
